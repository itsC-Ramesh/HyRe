<div class="pipeline-container">
  <header class="pipeline-header">
    <h2>Requisition Pipeline</h2>
    <p>Drag and drop candidates across stages.</p>
  </header>

  <div *ngIf="isLoading" class="loading-state">
    <div aria-busy="true">Loading pipeline...</div>
  </div>

  <div *ngIf="!isLoading" class="board" cdkDropListGroup>
    <div class="stage-column" *ngFor="let stage of stages">
      <div class="stage-header">
        <h3>{{ stage.name }}</h3>
        <span class="badge">{{ stage.candidates.length }}</span>
      </div>

      <div
        class="stage-list"
        cdkDropList
        [id]="'stage-' + stage.id"
        [cdkDropListData]="stage.candidates"
        [cdkDropListConnectedTo]="connectedDropLists"
        (cdkDropListDropped)="drop($event, stage)"
      >
        <div
          class="candidate-card"
          *ngFor="let candidate of stage.candidates"
          cdkDrag
        >
          <div class="card-content">
            <h4>{{ candidate.name }}</h4>
            <div class="card-meta">
              <span>{{ candidate.source }}</span>
              <span>{{ candidate.appliedDate | date:'shortDate' }}</span>
            </div>
          </div>
        </div>

        <!-- Empty state placeholder so list is dropable when empty -->
        <div class="empty-placeholder" *ngIf="stage.candidates.length === 0">
          Drop candidate here
        </div>
      </div>
    </div>
  </div>
</div>
