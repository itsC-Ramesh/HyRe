<div class="form-container">
  <header class="form-header">
    <div class="header-text">
      <h2>{{ isEditMode ? 'Edit Requisition' : 'Create New Requisition' }}</h2>
      <p>Define the details of the new role you are opening.</p>
    </div>
  </header>

  <div *ngIf="isLoading" class="loading-state">
    <div aria-busy="true">Loading...</div>
  </div>

  <form *ngIf="!isLoading" [formGroup]="reqForm" (ngSubmit)="onSubmit()" class="glass-form">
    
    <div class="form-group">
      <label for="title">Job Title <span class="required">*</span></label>
      <input type="text" id="title" formControlName="title" placeholder="e.g. Senior Software Engineer" />
      <small class="error" *ngIf="reqForm.get('title')?.touched && reqForm.get('title')?.invalid">
        Title is required.
      </small>
    </div>

    <div class="form-group">
      <label for="department">Department <span class="required">*</span></label>
      <input type="text" id="department" formControlName="department" placeholder="e.g. Engineering" />
      <small class="error" *ngIf="reqForm.get('department')?.touched && reqForm.get('department')?.invalid">
        Department is required.
      </small>
    </div>

    <div class="form-row">
      <div class="form-group half">
        <label for="salaryMin">Minimum Salary</label>
        <div class="input-icon">
          <span class="currency">$</span>
          <input type="number" id="salaryMin" formControlName="salaryMin" placeholder="80000" />
        </div>
      </div>
      <div class="form-group half">
        <label for="salaryMax">Maximum Salary</label>
        <div class="input-icon">
          <span class="currency">$</span>
          <input type="number" id="salaryMax" formControlName="salaryMax" placeholder="120000" />
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="headcount">Target Headcount <span class="required">*</span></label>
      <input type="number" id="headcount" formControlName="headcount" min="1" />
    </div>

    <div class="form-group">
      <label for="jdText">Job Description <span class="required">*</span></label>
      <textarea id="jdText" formControlName="jdText" rows="6" placeholder="Describe the role and responsibilities..."></textarea>
      <small class="error" *ngIf="reqForm.get('jdText')?.touched && reqForm.get('jdText')?.invalid">
        Job Description is required.
      </small>
    </div>

    <div class="form-actions">
      <button type="button" class="secondary-btn" (click)="cancel()">Cancel</button>
      <button type="submit" class="primary-btn" [disabled]="isSubmitting || reqForm.invalid" [attr.aria-busy]="isSubmitting">
        {{ isEditMode ? 'Save Changes' : 'Create Requisition' }}
      </button>
    </div>
  </form>
</div>
