<div class="form-container">
  <header class="form-header">
    <div class="header-text">
      <h2>Interview Scorecard</h2>
      <p>Evaluate the candidate based on your recent interview session.</p>
    </div>
  </header>

  <form [formGroup]="scorecardForm" (ngSubmit)="onSubmit()" class="glass-form">
    
    <div class="section-title">
      <h3>Ratings (1 = Poor, 5 = Excellent)</h3>
    </div>

    <div class="rating-grid">
      <div class="form-group rating-group">
        <label>Technical / Role Skills <span class="required">*</span></label>
        <div class="rating-options">
          <label class="radio-label" *ngFor="let val of [1,2,3,4,5]">
            <input type="radio" formControlName="technical" [value]="val" />
            <span>{{ val }}</span>
          </label>
        </div>
      </div>

      <div class="form-group rating-group">
        <label>Communication <span class="required">*</span></label>
        <div class="rating-options">
          <label class="radio-label" *ngFor="let val of [1,2,3,4,5]">
            <input type="radio" formControlName="communication" [value]="val" />
            <span>{{ val }}</span>
          </label>
        </div>
      </div>

      <div class="form-group rating-group">
        <label>Culture & Values <span class="required">*</span></label>
        <div class="rating-options">
          <label class="radio-label" *ngFor="let val of [1,2,3,4,5]">
            <input type="radio" formControlName="culture" [value]="val" />
            <span>{{ val }}</span>
          </label>
        </div>
      </div>
    </div>

    <div class="section-title">
      <h3>Detailed Feedback</h3>
    </div>

    <div class="form-group">
      <label for="strengths">Strengths <span class="required">*</span></label>
      <textarea id="strengths" formControlName="strengths" rows="4" placeholder="What did the candidate do well?"></textarea>
    </div>

    <div class="form-group">
      <label for="concerns">Concerns <span class="required">*</span></label>
      <textarea id="concerns" formControlName="concerns" rows="4" placeholder="Any red flags or areas for improvement?"></textarea>
    </div>

    <div class="section-title">
      <h3>Final Recommendation</h3>
    </div>

    <div class="form-group">
      <select id="recommendation" formControlName="recommendation">
        <option value="">Select recommendation...</option>
        <option value="strong_yes">Strong Yes</option>
        <option value="yes">Yes</option>
        <option value="no">No</option>
        <option value="strong_no">Strong No</option>
      </select>
    </div>

    <div class="form-actions">
      <button type="button" class="secondary-btn" (click)="cancel()">Cancel</button>
      <button type="submit" class="primary-btn submit-score-btn" [disabled]="isSubmitting || scorecardForm.invalid" [attr.aria-busy]="isSubmitting">
        Submit Scorecard
      </button>
    </div>
  </form>
</div>
